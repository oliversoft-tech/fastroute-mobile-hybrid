name: Product Governance CI (Mobile)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: governance-mobile-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  DOMAIN_REPO: fastroute-domain
  API_REPO: fastroute-api
  MOBILE_REPO: fastroute-mobile-hybrid

jobs:
  regression-unit:
    name: Unit + Integration Regression (3 repos)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout domain
        uses: actions/checkout@v4
        with:
          repository: ${{ format('{0}/{1}', github.repository_owner, env.DOMAIN_REPO) }}
          ref: ${{ github.repository == format('{0}/{1}', github.repository_owner, env.DOMAIN_REPO) && github.sha || 'main' }}
          token: ${{ secrets.CROSS_REPO_PAT }}
          path: domain

      - name: Checkout API
        uses: actions/checkout@v4
        with:
          repository: ${{ format('{0}/{1}', github.repository_owner, env.API_REPO) }}
          ref: ${{ github.repository == format('{0}/{1}', github.repository_owner, env.API_REPO) && github.sha || 'main' }}
          token: ${{ secrets.CROSS_REPO_PAT }}
          path: api

      - name: Checkout mobile
        uses: actions/checkout@v4
        with:
          repository: ${{ format('{0}/{1}', github.repository_owner, env.MOBILE_REPO) }}
          ref: ${{ github.repository == format('{0}/{1}', github.repository_owner, env.MOBILE_REPO) && github.sha || 'main' }}
          token: ${{ secrets.CROSS_REPO_PAT }}
          path: mobile

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Domain - lint/test/build
        run: |
          cd domain
          npm ci
          npm run lint
          npm run typecheck
          npm run test
          npm run build
          npm pack

      - name: API - lint/typecheck/test/build
        run: |
          cd api
          npm ci
          npm install --no-save ../domain/*.tgz
          npm run lint
          npm run typecheck
          npm test
          npm run build

      - name: Mobile - typecheck/unit tests
        run: |
          cd mobile
          npm ci
          npm install --no-save ../domain/*.tgz
          npm run typecheck
          npm run test:unit

  mobile-ui-android:
    name: Functional UI (Android)
    runs-on: ubuntu-latest
    needs: [regression-unit]

    steps:
      - name: Checkout domain
        uses: actions/checkout@v4
        with:
          repository: ${{ format('{0}/{1}', github.repository_owner, env.DOMAIN_REPO) }}
          ref: ${{ github.repository == format('{0}/{1}', github.repository_owner, env.DOMAIN_REPO) && github.sha || 'main' }}
          token: ${{ secrets.CROSS_REPO_PAT }}
          path: domain

      - name: Checkout mobile
        uses: actions/checkout@v4
        with:
          repository: ${{ format('{0}/{1}', github.repository_owner, env.MOBILE_REPO) }}
          ref: ${{ github.repository == format('{0}/{1}', github.repository_owner, env.MOBILE_REPO) && github.sha || 'main' }}
          token: ${{ secrets.CROSS_REPO_PAT }}
          path: mobile

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Prepare domain package
        run: |
          cd domain
          npm ci
          npm run build
          npm pack

      - name: Build Android debug app
        env:
          EXPO_PUBLIC_E2E_BYPASS_LOGIN: "1"
        run: |
          cd mobile
          npm ci
          npm install --no-save ../domain/*.tgz
          npx expo prebuild -p android --non-interactive
          cd android
          ./gradlew assembleDebug

      - name: Run Maestro flow on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          profile: pixel_7
          script: |
            cd mobile
            export MAESTRO_FLOW_TARGET=.maestro/flows
            bash ./scripts/ci/run-maestro-tests.sh android

      - name: Upload Android UI test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-android-${{ github.run_id }}
          if-no-files-found: warn
          path: |
            mobile/.maestro/results/android
            mobile/.maestro/debug/android-*

  mobile-ui-ios:
    name: Functional UI (iOS)
    runs-on: macos-14
    needs: [regression-unit]

    steps:
      - name: Checkout domain
        uses: actions/checkout@v4
        with:
          repository: ${{ format('{0}/{1}', github.repository_owner, env.DOMAIN_REPO) }}
          ref: ${{ github.repository == format('{0}/{1}', github.repository_owner, env.DOMAIN_REPO) && github.sha || 'main' }}
          token: ${{ secrets.CROSS_REPO_PAT }}
          path: domain

      - name: Checkout mobile
        uses: actions/checkout@v4
        with:
          repository: ${{ format('{0}/{1}', github.repository_owner, env.MOBILE_REPO) }}
          ref: ${{ github.repository == format('{0}/{1}', github.repository_owner, env.MOBILE_REPO) && github.sha || 'main' }}
          token: ${{ secrets.CROSS_REPO_PAT }}
          path: mobile

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Prepare domain package
        run: |
          cd domain
          npm ci
          npm run build
          npm pack

      - name: Build iOS simulator app
        env:
          EXPO_PUBLIC_E2E_BYPASS_LOGIN: "1"
        run: |
          set -euo pipefail
          cd mobile
          npm ci
          npm install --no-save ../domain/*.tgz
          npx expo prebuild -p ios --non-interactive
          cd ios
          pod install
          cd ..

          SIM_ID=$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/ { print $2; exit }')
          if [ -z "$SIM_ID" ]; then
            echo "Nenhum simulador iPhone disponível" >&2
            exit 1
          fi

          xcrun simctl boot "$SIM_ID" || true
          xcrun simctl bootstatus "$SIM_ID" -b

          xcodebuild \
            -workspace ios/FastRoute.xcworkspace \
            -scheme FastRoute \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "id=$SIM_ID" \
            -derivedDataPath ios/build \
            build

          APP_PATH=$(find ios/build/Build/Products -type d -name "FastRoute.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "App iOS não encontrada em ios/build/Build/Products" >&2
            exit 1
          fi

          xcrun simctl install booted "$APP_PATH"

      - name: Run Maestro flow on iOS simulator
        run: |
          cd mobile
          export MAESTRO_FLOW_TARGET=.maestro/flows
          bash ./scripts/ci/run-maestro-tests.sh ios

      - name: Upload iOS UI test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-ios-${{ github.run_id }}
          if-no-files-found: warn
          path: |
            mobile/.maestro/results/ios
            mobile/.maestro/debug/ios-*

  governance-gate:
    name: Governance Gate
    runs-on: ubuntu-latest
    needs: [regression-unit, mobile-ui-android, mobile-ui-ios]
    steps:
      - name: Mark gate as passed
        run: echo "Todos os gates de regressão passaram com sucesso."
