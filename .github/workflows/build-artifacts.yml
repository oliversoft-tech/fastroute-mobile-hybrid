name: Build Mobile Artifacts

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref para build (branch, tag ou SHA)
        required: false
        default: main
        type: string
      profile:
        description: Perfil EAS para build interno
        required: true
        default: preview
        type: choice
        options:
          - development
          - preview
          - production

permissions:
  contents: read

jobs:
  build-artifacts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS CLI
        run: npm install -g eas-cli

      - name: Build Android artifact (EAS)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build --platform android --profile "${{ inputs.profile }}" --non-interactive --wait --json > android-build.json

      - name: Build iOS artifact (EAS)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build --platform ios --profile "${{ inputs.profile }}" --non-interactive --wait --json > ios-build.json

      - name: Summary
        run: |
          ANDROID_URL=$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync('android-build.json','utf8')); const i=Array.isArray(r)?r[0]:r; console.log(i?.artifacts?.buildUrl || i?.buildUrl || 'N/A');")
          IOS_URL=$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync('ios-build.json','utf8')); const i=Array.isArray(r)?r[0]:r; console.log(i?.artifacts?.buildUrl || i?.buildUrl || 'N/A');")
          {
            echo "## Mobile artifacts";
            echo "- Android: $ANDROID_URL";
            echo "- iOS: $IOS_URL";
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload raw EAS responses
        uses: actions/upload-artifact@v4
        with:
          name: eas-build-responses
          path: |
            android-build.json
            ios-build.json
