name: Trigger Central Governance

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch governance run to central orchestrator
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.CROSS_REPO_PAT }}
          repository: oliversoft-tech/fastroute-changemanagement
          event-type: governance-ci
          client-payload: >-
            {"source_repo":"fastroute-mobile-hybrid","source_event":"${{ github.event_name }}","source_ref":"${{ github.ref_name }}","source_sha":"${{ github.sha }}","head_ref":"${{ github.event.pull_request.head.ref || github.ref_name }}","head_sha":"${{ github.event.pull_request.head.sha || github.sha }}"}
